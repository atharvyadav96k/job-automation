services:
  postgres:
    image: postgres:16-alpine
    mem_limit: 512m
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-jobauto}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-jobauto}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    mem_limit: 128m
    ports:
      - "6379:6379"

  app:
    build: ./app
    mem_limit: 1g
    depends_on:
      - postgres
      - redis
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgres://${POSTGRES_USER:-jobauto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jobauto}?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - API_BASIC_AUTH_USER=${API_BASIC_AUTH_USER:?API_BASIC_AUTH_USER is required}
      - API_BASIC_AUTH_PASS=${API_BASIC_AUTH_PASS:?API_BASIC_AUTH_PASS is required}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
    volumes:
      - resume_data:/app/data
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    mem_limit: 128m
    depends_on:
      - app
    ports:
      - "3000:80"

volumes:
  pgdata:
  resume_data:
